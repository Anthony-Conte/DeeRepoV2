<div class="item-list">
  <lib-dee-button (click)="addItem()">Add Item</lib-dee-button>

  <h1>Selected Items</h1>

  @for (selectedItem of itemsFacade.selectedItems$ | async; track
  selectedItem.id) {
  <lib-dee-button
    (click)="updateItemSelected(selectedItem, !selectedItem.selected)"
    >{{selectedItem.name}}</lib-dee-button
  >
  }
  <h1>Unselected Items</h1>
  @for (unselectedItem of itemsFacade.unselectedItems$ | async; track
  unselectedItem.id) {
  <lib-dee-button
    (click)="updateItemSelected(unselectedItem, !unselectedItem.selected)"
    >{{unselectedItem.name}}</lib-dee-button
  >
  }
</div>
